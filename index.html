<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Walk-Up Song Lineup</title>
<style>
body { font-family: Arial, sans-serif; }
.lineup { list-style: none; padding: 0; }
.lineup li {
  padding: 10px;
  margin: 5px 0;
  background: #eee;
  cursor: pointer;
  border-radius: 5px;
}
.lineup li:hover { background: #ddd; }
</style>
</head>
<body>

<h2>Player Lineup</h2>
<ul id="lineup" class="lineup"></ul>

<audio id="player" controls></audio>

<script>
async function loadLineup() {
  const response = await fetch('/api/players');
  const players = await response.json();
  const lineupEl = document.getElementById('lineup');

  players.forEach((p, index) => {
    const li = document.createElement('li');
    li.textContent = `${index + 1}. ${p.name}`;
    li.onclick = () => playSong(p.folder);
    lineupEl.appendChild(li);
  });
}

function playSong(folder) {
  const audio = document.getElementById('player');
  audio.src = `audio/${folder}/walkup.mp3`;
  audio.play().catch(err => console.log(err));
}

// Initialize
loadLineup();
</script>

</body>
</html>
