<audio id="player" controls></audio>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9oWlllaSkmOeeovWg36JIr3GpNUiAskFwwrI1ZSb1RXu6jMV1GSa1_PoqDDLGRmOL87Xxa8fjtXxE/pub?gid=0&single=true&output=csv";

fetch(sheetUrl)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    const container = document.getElementById("players");

    rows.forEach(row => {
      const [name, number, fileIdRaw] = row.split(",");
      const fileId = fileIdRaw?.trim();

      if (!fileId) return;

      const btn = document.createElement("button");
      btn.innerText = `${number} - ${name}`;

      btn.onclick = () => {
        const audio = document.getElementById("player");

        audio.src = `https://drive.google.com/uc?export=download&id=${fileId}`;
        audio.load();
        audio.currentTime = 0;

        audio.play().catch(err => console.log(err));
      };

      container.appendChild(btn);
    });
  });
</script>
