<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Walk-Up Song Lineup</title>
<style>
body { font-family: Arial, sans-serif; }
.lineup { list-style: none; padding: 0; }
.lineup li {
  padding: 10px;
  margin: 5px 0;
  background: #eee;
  cursor: pointer;
  border-radius: 5px;
}
.lineup li:hover { background: #ddd; }
</style>
</head>
<body>

<h2>Player Lineup</h2>
<ul id="lineup" class="lineup"></ul>

<audio id="player" controls></audio>
<script>
const players = [
  { name: "John Stoeckel", number: 12, folder: "JohnnyStoeckel" },
  { name: "Player Two", number: 34, folder: "player2" },
  { name: "Player Three", number: 56, folder: "player3" }
];

function announce(text) {
  const msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

function loadLineup() {
  const lineupEl = document.getElementById('lineup');
  lineupEl.innerHTML = "";

  players.forEach((p, index) => {
    const li = document.createElement('li');

    li.textContent = `${index + 1}. #${p.number} ${p.name}`;

    // ✅ pass folder correctly
    li.onclick = () => {
      playSong(p.name, p.number, p.folder);
    };

    lineupEl.appendChild(li);
  });
}

function playSong(name, number, folder) {
  const audio = document.getElementById("player");

  // 🔊 Announce
  announce(`Now batting, number ${number}, ${name}`);

  // ▶️ Play after delay
  setTimeout(() => {
    audio.src = `audio/${folder}/walkup.mp3`;
    audio.load();
    audio.play().catch(err => console.log(err));
  }, 2000);
}

// Initialize
loadLineup();
</script>
</body>
</html>
